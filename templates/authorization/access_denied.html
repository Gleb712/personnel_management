{% extends 'base.html' %}
{% block title %}Доступ запрещён{% endblock %}
{% block page_title %}Доступ запрещён{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
    <div class="card" style="border-color:rgba(239,68,68,.3);text-align:center;padding:48px 32px">
        <div style="font-size:56px;margin-bottom:16px">🔒</div>
        <h2 style="font-size:20px;font-weight:700;color:white;margin-bottom:8px">
            Недостаточно прав
        </h2>
        <p style="color:var(--text-secondary);font-size:14px;margin-bottom:28px">
            У вашей роли нет доступа к этой странице.<br>
            Обратитесь к администратору если считаете это ошибкой.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="{% url 'core:report_headcount' %}" class="btn btn-primary btn-sm">
                <i class="bi bi-bar-chart me-1"></i>К отчётам
            </a>
            <a href="{% url 'core:logout' %}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Выйти
            </a>
        </div>
    </div>
</div>
</div>
{% endblock %}
