{% extends 'base.html' %}

{% block title %}Удаление сотрудника{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h4><i class="fas fa-exclamation-triangle"></i> Подтверждение удаления</h4>
                </div>
                <div class="card-body">
                    <p class="lead">Вы уверены, что хотите удалить сотрудника?</p>
                    
                    <div class="alert alert-warning">
                        <strong>ФИО:</strong> {{ employee.full_name }}<br>
                        <strong>Табельный номер:</strong> {{ employee.employee_number }}
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'employee_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Отмена
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash"></i> Удалить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
